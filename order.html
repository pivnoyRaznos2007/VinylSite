<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформить заказ — VINYLTECH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">VINYLTECH</div>
        <nav>
            <a href="index.html">На главную</a>
        </nav>
    </header>

    <section class="order-section">
        <h1>Оформление заказа</h1>
        <p>Заполните форму ниже, и мы свяжемся с вами для подтверждения заказа</p>

        <form id="feedbackForm" class="main-form">
            <div class="form-group">
                <label for="userName">Ваше имя</label>
                <input type="text" id="userName" placeholder="Введите имя">
            </div>

            <div class="form-group">
                <label for="userEmail">Email</label>
                <input type="email" id="userEmail" placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label for="userAlbum">Выберите пластинку</label>
                <select id="userAlbum">
                    <option value="">Выберите из списка...</option>
                    <option value="Tyler, The Creator - Chromakopia">Tyler, The Creator - Chromakopia (2024)</option>
                    <option value="Tyler, The Creator - IGOR">Tyler, The Creator - IGOR (2019)</option>
                    <option value="Tame Impala - Currents">Tame Impala - Currents (2015)</option>
                    <option value="Tame Impala - The Slow Rush">Tame Impala - The Slow Rush (2020)</option>
                    <option value="Radiohead - In Rainbows">Radiohead - In Rainbows (2007)</option>
                    <option value="Pink Floyd - The Dark Side of the Moon">Pink Floyd - The Dark Side of the Moon (1973)</option>
                    <option value="The Beatles - Abbey Road">The Beatles - Abbey Road (1969)</option>
                    <option value="Radiohead - OK Computer">Radiohead - OK Computer (1997)</option>
                    <option value="Другое">Другое (укажите в комментарии)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="userComment">Комментарий</label>
                <textarea id="userComment" placeholder="Дополнительная информация..."></textarea>
            </div>

            <button type="submit" class="submit-btn">ОТПРАВИТЬ ЗАЯВКУ</button>
        </form>

        <div id="result-output"></div>
    </section>

    <footer>
        <p>© VINYLTECH 2026. Все права защищены.</p>
        <p>Качественный винил для истинных ценителей музыки</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
